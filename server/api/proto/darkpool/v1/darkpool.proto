syntax = "proto3";

package darkpool.v1;

option go_package = "github.com/darkpool-exchange/server/api/gen/darkpool/v1;darkpoolv1";

import "google/api/annotations.proto";

service DarkPoolService {
  rpc PlaceOrder(PlaceOrderRequest) returns (PlaceOrderResponse) {
    option (google.api.http) = {
      post: "/v1/orders"
      body: "*"
    };
  }

  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse) {
    option (google.api.http) = {
      delete: "/v1/orders/{order_id}"
    };
  }

  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse) {
    option (google.api.http) = {
      get: "/v1/orders/{order_id}"
    };
  }

  rpc GetOrderBook(GetOrderBookRequest) returns (GetOrderBookResponse) {
    option (google.api.http) = {
      get: "/v1/orderbook"
    };
  }

  rpc GetAuctionHistory(GetAuctionHistoryRequest) returns (GetAuctionHistoryResponse) {
    option (google.api.http) = {
      get: "/v1/auctions"
    };
  }

  rpc StreamAuctions(StreamAuctionsRequest) returns (stream AuctionEvent) {}
}

// --- Place Order ---

message PlaceOrderRequest {
  string pair = 1;
  Side side = 2;
  string price = 3;  // decimal as string for precision
  string size = 4;
  string commitment_key = 5;
  int32 ttl_seconds = 6;  // 0 = default (10 min)
}

message PlaceOrderResponse {
  OrderInfo order = 1;
}

// --- Cancel Order ---

message CancelOrderRequest {
  string order_id = 1;
  string reason = 2;
}

message CancelOrderResponse {}

// --- Get Order ---

message GetOrderRequest {
  string order_id = 1;
}

message GetOrderResponse {
  OrderInfo order = 1;
}

// --- Order Book ---

message GetOrderBookRequest {
  string pair = 1;
}

message GetOrderBookResponse {
  string pair = 1;
  repeated PriceLevel bids = 2;
  repeated PriceLevel asks = 3;
}

message PriceLevel {
  string price = 1;
  string total_size = 2;
  int32 order_count = 3;
}

// --- Auction History ---

message GetAuctionHistoryRequest {
  string pair = 1;
  int32 limit = 2;  // 0 = default (50)
}

message GetAuctionHistoryResponse {
  repeated AuctionSummary auctions = 1;
}

message AuctionSummary {
  string auction_id = 1;
  string pair = 2;
  string clearing_price = 3;
  string matched_volume = 4;
  int32 match_count = 5;
  int64 timestamp_unix = 6;
}

// --- Stream Auctions ---

message StreamAuctionsRequest {
  string pair = 1;  // empty = all pairs
}

message AuctionEvent {
  string auction_id = 1;
  string pair = 2;
  string clearing_price = 3;
  string matched_volume = 4;
  int32 match_count = 5;
  int64 timestamp_unix = 6;
}

// --- Shared types ---

enum Side {
  SIDE_UNSPECIFIED = 0;
  SIDE_BUY = 1;
  SIDE_SELL = 2;
}

message OrderInfo {
  string id = 1;
  string pair = 2;
  Side side = 3;
  string price = 4;
  string size = 5;
  string remaining_size = 6;
  string commitment_key = 7;
  int64 submitted_at_unix = 8;
  int64 expires_at_unix = 9;
}
